# Codecov configuration.
#
# The repo ships two independent test suites that each upload their own coverage
# under separate flags: the Python backend (flag: backend) and the TypeScript
# frontend (flag: frontend). Reporting them as separate flags and components
# keeps each suite judged on its own number so neither dilutes or regresses the
# other. (The Playwright e2e suite is complementary — it does not upload coverage
# and is not a substitute for these unit tests.)

coverage:
  status:
    # Don't fail a PR on the *combined* number; each area is judged on its own
    # component status below.
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

# Carry a flag's last known coverage forward when a given run doesn't re-upload
# it, so an unrelated change never shows a flag dropping to zero.
flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: backend
      paths:
        - app/
    - name: frontend
      paths:
        - frontend/src/

component_management:
  individual_components:
    - component_id: backend
      name: Backend (Python)
      paths:
        - app/**
      statuses:
        - type: project
          target: auto
          threshold: 1%
    - component_id: frontend
      name: Frontend (TypeScript)
      paths:
        - frontend/src/**
      statuses:
        # Use an absolute target rather than `auto`: on the first PR that adds
        # frontend coverage, `main` has no frontend baseline, so `auto` reports
        # "No coverage information found on base report". A fixed target gives the
        # status something to compare against immediately. The unit suite sits at
        # ~95% statements; 90% is a realistic floor with a little slack. Kept
        # informational so coverage is reported without gating merges.
        - type: project
          target: 90%
          informational: true
