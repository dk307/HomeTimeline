name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: lint + unit + integration ───────────────────────────────────────
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint — ruff check
        run: ruff check --output-format=github .

      - name: Lint — ruff format
        run: ruff format --check .

      - name: Unit + integration tests
        run: |
          pytest tests/unit tests/integration \
            -v \
            --tb=short \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -p no:playwright
        env:
          DATABASE_URL: "sqlite:////tmp/test_cam.db"
          RECORDING_LOCATIONS: "/tmp/test_recordings"
          THUMBNAIL_DIR: "/tmp/test_thumbnails"

      - name: Coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-xml-coverage-path: coverage.xml
          title: Coverage Report
          badge-title: Coverage
          hide-badge: false
          hide-report: false
          create-new-comment: false
          hide-comment: false
          report-only-changed-files: false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ── Frontend: type-check + build ─────────────────────────────────────────────
  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22"]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit + component tests
        run: npm run test:coverage

      # v8's lcov reporter emits paths relative to frontend/ (e.g. "src/App.tsx").
      # Codecov processes the report from the repo root, so rewrite them to
      # repo-root-relative ("frontend/src/App.tsx") — otherwise none of the files
      # match and the frontend coverage silently lands as empty.
      - name: Rebase coverage paths to the repo root
        run: sed -i 's#^SF:#SF:frontend/#' coverage/lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

      - name: Build
        run: npm run build

  # ── E2E: build image, start container, run Playwright (PRs + main) ──────────
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: hometimeline:e2e
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          mkdir -p /tmp/cem-data /tmp/cem-thumbnails
          docker run -d --name cem-e2e \
            -p 8080:8080 \
            -v /tmp/cem-data:/app/data \
            -e DATABASE_URL=sqlite:////app/data/test.db \
            -e RECORDING_LOCATIONS=/tmp/recordings \
            -e THUMBNAIL_DIR=/tmp/cem-thumbnails \
            hometimeline:e2e

      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/api/v1/health && echo " ready" && exit 0
            echo "Waiting... ($i/30)" && sleep 2
          done
          echo "Container never became healthy" && exit 1

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Playwright + test deps
        run: pip install pytest pytest-playwright playwright requests

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          pytest tests/e2e/test_settings.py tests/e2e/test_dashboard.py tests/e2e/test_cameras.py \
            -v --tb=short \
            --base-url http://localhost:8080

      - name: Stop container
        if: always()
        run: docker stop cem-e2e || true; docker rm cem-e2e || true

  # ── Release: semantic version tag + GitHub Release + Docker image on main ────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [backend, frontend, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write   # create git tag + GitHub Release
      packages: write   # push image to GHCR

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0            # full history + tags so the version can be derived
          persist-credentials: false  # tag action authenticates via github_token (API), no stored git credential needed

      # Derive the next semantic version from Conventional Commit messages since
      # the last tag (feat → minor, fix/others → patch, BREAKING CHANGE → major).
      # Creates and pushes the new git tag.
      - name: Compute & create version tag
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          tag_prefix: v

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        env:
          VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          REPO="${GITHUB_REPOSITORY,,}"
          echo "IMAGE_LATEST=ghcr.io/${REPO}:latest" >> "$GITHUB_ENV"
          echo "IMAGE_VERSION=ghcr.io/${REPO}:${VERSION}" >> "$GITHUB_ENV"

      - name: Build and push image (:latest and :<version>)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_LATEST }}
            ${{ env.IMAGE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          name: ${{ steps.version.outputs.new_tag }}
          body: ${{ steps.version.outputs.changelog }}
