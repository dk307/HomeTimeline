version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: camera-event-manager
    restart: unless-stopped
    ports:
      - "8080:8080"
      # go2rtc WebRTC over TCP — browsers on the LAN connect here for live view.
      - "8555:8555"
    volumes:
      - /opt/camera-event-manager/data:/app/data
      # Writable: Hikvision downloads write clips into this tree.
      - ${RECORDING_PATH:-/nas/camera}:/nas/camera
    environment:
      SCAN_INTERVAL_MINUTES: ${SCAN_INTERVAL_MINUTES:-5}
      DATE_FOLDER_FORMAT: ${DATE_FOLDER_FORMAT:-%Y-%m-%d}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Keep the log on the mounted data volume so it survives container restarts.
      LOG_FILE: ${LOG_FILE:-/app/data/app.log}
      # Advertise the host's LAN IP:port so browsers can reach go2rtc for WebRTC.
      GO2RTC_WEBRTC_CANDIDATE: ${GO2RTC_WEBRTC_CANDIDATE:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
